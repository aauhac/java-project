spring.application.name=TradeAgent

# Alpaca
alpaca.base-url=https://data.alpaca.markets/v2
alpaca.api-key=${ALPACA_API_KEY:}
alpaca.api-secret=${ALPACA_API_SECRET:}
alpaca.default-symbol=AAPL
alpaca.default-timeframe=1Day
alpaca.default-limit=60

# GDELT
gdelt.base-url=https://api.gdeltproject.org/api/v2
gdelt.timeout-seconds=10
gdelt.lookback-days=7

# vLLM
vllm.base-url=http://localhost:8000
vllm.model=mistralai/Mistral-7B-Instruct-v0.2
vllm.max-tokens=512
vllm.temperature=0.7
vllm.timeout-seconds=30

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 (개발용 인메모리 DB, 추후 교체 가능)
spring.datasource.url=jdbc:h2:mem:tradeagent;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
