spring.application.name=TradeAgent
spring.config.import=optional:file:.env[.properties]

# Alpaca
alpaca.api-key=${ALPACA_API_KEY:}
alpaca.api-secret=${ALPACA_API_SECRET:}

# vLLM
vllm.enabled=${VLLM_ENABLED:false}
vllm.base-url=${VLLM_BASE_URL:http://localhost:8000}
vllm.model=${VLLM_MODEL:Qwen/Qwen2.5-1.5B-Instruct}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 (file-based DB, not in-memory)
spring.datasource.url=jdbc:h2:file:./data/tradeagent;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# Logging
logging.level.com.tradeagent=INFO
