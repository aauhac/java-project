spring.application.name=TradeAgent

# Alpaca
alpaca.base-url=https://data.alpaca.markets/v2
alpaca.api-key=${ALPACA_API_KEY:}
alpaca.api-secret=${ALPACA_API_SECRET:}
alpaca.default-symbol=AAPL
alpaca.default-timeframe=1Day
alpaca.default-limit=60

# GDELT
gdelt.base-url=https://api.gdeltproject.org/api/v2
gdelt.timeout-seconds=10
gdelt.lookback-days=3
gdelt.max-records=80

# vLLM
vllm.enabled=${VLLM_ENABLED:false}
vllm.base-url=${VLLM_BASE_URL:http://localhost:8000}
vllm.model=${VLLM_MODEL:Qwen/Qwen2.5-7B-Instruct}
vllm.max-tokens=512
vllm.temperature=0.7
vllm.timeout-seconds=30
vllm.api-key=${VLLM_API_KEY:}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 (file-based DB)
spring.datasource.url=jdbc:h2:file:./data/tradeagent;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# Seed Configuration
trade.seed.enabled=true
trade.seed.reference-data-enabled=true
trade.seed.sample-data-enabled=false
