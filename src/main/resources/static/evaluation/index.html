<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeAgent Evaluation</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/layout.js" defer></script>
    <script src="/js/api.js" defer></script>
    <script src="/js/format.js" defer></script>
</head>
<body>
<div id="app-nav"></div>

<main class="page-shell">
    <section class="page-hero">
        <h1 class="page-title">투자 판단 평가</h1>
        <p class="page-description">평균 점수와 거래별 평가 결과를 함께 확인하고, 템플릿 피드백을 바로 읽을 수 있습니다.</p>
    </section>

    <div id="page-status"></div>

    <section class="section">
        <div id="summary-cards" class="grid cols-4"></div>
    </section>

    <section class="section">
        <div class="section-header">
            <div>
                <h2 class="section-title">피드백</h2>
                <p class="section-subtitle">평가 요약을 바탕으로 생성된 설명 문장입니다.</p>
            </div>
        </div>
        <div class="card feedback-box" id="feedback-box"></div>
    </section>

    <section class="section">
        <div class="section-header">
            <div>
                <h2 class="section-title">거래별 평가</h2>
                <p class="section-subtitle">현재 API에서 제공하는 거래 평가 상세 결과입니다.</p>
            </div>
        </div>
        <div class="card" id="evaluations-table"></div>
    </section>
</main>

<script>
    window.addEventListener('DOMContentLoaded', async () => {
        Layout.mountNavigation('evaluation');
        const statusHost = document.getElementById('page-status');
        statusHost.innerHTML = Layout.alert('평가 데이터를 불러오는 중입니다.', 'info');

        try {
            const [summaryResponse, evaluationsResponse, feedbackResponse] = await Promise.all([
                API.getEvaluationSummary(1),
                API.getTradeEvaluations(1),
                API.getTradeFeedback(1)
            ]);

            renderSummary(summaryResponse.data);
            renderFeedback(feedbackResponse.data);
            renderEvaluations(evaluationsResponse.data || []);
            statusHost.innerHTML = Layout.alert('평가 데이터 로딩이 완료되었습니다.', 'success');
        } catch (error) {
            statusHost.innerHTML = Layout.alert(error.message || '평가 데이터를 불러오지 못했습니다.', 'error');
        }
    });

    function renderSummary(summary) {
        const cards = [
            ['종합 판단 점수', Format.score(summary.averageTotalScore), summary.mainWeakness || '요약 약점 정보 없음'],
            ['진입 타이밍', Format.score(summary.averageEntryScore), '평균 Entry 점수'],
            ['청산 타이밍', Format.score(summary.averageExitScore), '평균 Exit 점수'],
            ['리스크 관리', Format.score(summary.averageRiskScore), '평균 Risk 점수'],
            ['분산 투자', Format.score(summary.averageDiversificationScore), '평균 Diversification 점수'],
            ['섹터 적합성', Format.score(summary.averageSectorFitScore), '평균 Sector Fit 점수']
        ];

        document.getElementById('summary-cards').innerHTML = cards.map(([label, value, hint]) => `
            <article class="card stat-card">
                <div class="stat-card__label">${label}</div>
                <div class="stat-card__value">${value}</div>
                <div class="stat-card__hint">${Layout.escapeHtml(hint)}</div>
            </article>
        `).join('');
    }

    function renderFeedback(feedback) {
        document.getElementById('feedback-box').innerHTML = `
            <div>${Layout.escapeHtml(feedback.message || '피드백이 없습니다.')}</div>
            <div class="muted" style="margin-top:10px;">Provider: ${Layout.escapeHtml(feedback.providerType || '-')} / ${Format.dateTime(feedback.createdAt)}</div>
        `;
    }

    function renderEvaluations(items) {
        const host = document.getElementById('evaluations-table');
        if (!items.length) {
            host.innerHTML = Layout.empty('거래 평가 데이터가 없습니다.');
            return;
        }

        host.innerHTML = `
            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>거래 ID</th>
                        <th>Total</th>
                        <th>Entry</th>
                        <th>Exit</th>
                        <th>Risk</th>
                        <th>Diversification</th>
                        <th>Sector Fit</th>
                        <th>평가 시각</th>
                        <th>피드백</th>
                    </tr>
                    </thead>
                    <tbody>
                    ${items.map(item => `
                        <tr>
                            <td>#${Format.integer(item.tradeHistoryId)}</td>
                            <td><strong>${Format.score(item.totalScore)}</strong></td>
                            <td>${Format.score(item.entryScore)}</td>
                            <td>${Format.score(item.exitScore)}</td>
                            <td>${Format.score(item.riskScore)}</td>
                            <td>${Format.score(item.diversificationScore)}</td>
                            <td>${Format.score(item.sectorFitScore)}</td>
                            <td>${Format.dateTime(item.evaluatedAt)}</td>
                            <td>${Layout.escapeHtml(item.feedback || '-')}</td>
                        </tr>
                    `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }
</script>
</body>
</html>
