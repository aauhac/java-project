<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeAgent Analysis</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/layout.js" defer></script>
    <script src="/js/api.js?v=20260518-1" defer></script>
    <script src="/js/format.js" defer></script>
</head>
<body>
<div id="app-nav"></div>

<main class="page-shell">
    <section class="page-hero">
        <h1 class="page-title">투자 판단 품질 평가</h1>
        <p class="page-description">점수 평가, 놓친 기회/피한 위험, 섹터 진단을 하나의 화면으로 통합합니다.</p>
    </section>

    <div id="page-status"></div>

    <section class="section">
        <div class="section-header">
            <div>
                <h2 class="section-title">점수 평가</h2>
                <p class="section-subtitle">종합 점수와 항목별 점수, 거래별 평가 결과를 표시합니다.</p>
            </div>
        </div>
        <div id="evaluation-summary-cards" class="grid cols-4"></div>
        <div class="card feedback-box" id="trade-feedback-box" style="margin-top: 16px;"></div>
        <div class="card" id="evaluations-table" style="margin-top: 16px;"></div>
    </section>

    <section class="section">
        <div class="section-header">
            <div>
                <h2 class="section-title">놓친 기회 / 피한 위험</h2>
                <p class="section-subtitle">TOP 3 사례와 거래 패턴을 요약합니다.</p>
            </div>
        </div>
        <div id="opportunity-summary-cards" class="grid cols-4"></div>
        <div class="grid cols-2" style="margin-top: 16px;">
            <div class="card">
                <h3 class="section-title">놓친 기회 TOP 3</h3>
                <div id="missed-list"></div>
            </div>
            <div class="card">
                <h3 class="section-title">피한 위험 TOP 3</h3>
                <div id="avoided-list"></div>
            </div>
        </div>
        <div class="card" id="patterns-table" style="margin-top: 16px;"></div>
        <div class="card feedback-box" id="opportunity-feedback-box" style="margin-top: 16px;"></div>
    </section>

    <section class="section">
        <div class="section-header">
            <div>
                <h2 class="section-title">섹터 동향 분석</h2>
                <p class="section-subtitle">날짜별 뉴스 동향 점수와 포트폴리오 일치도를 비교합니다.</p>
            </div>
            <div class="form-grid" style="grid-template-columns: repeat(2, minmax(140px, 1fr)); max-width: 320px;">
                <label class="form-label">
                    기준 날짜
                    <input class="input" id="trend-date" type="date">
                </label>
                <button class="button" id="analyze-trend-button" type="button" style="align-self: end;">동향 분석</button>
            </div>
        </div>
        <div id="sector-scoreboard" class="grid cols-4"></div>
        <div id="diagnostic-cards" class="grid cols-2" style="margin-top: 16px;"></div>
        <div class="card" id="exposure-table" style="margin-top: 16px;"></div>
    </section>
</main>

<script>
    const trendState = {
        selectedDate: '',
        isAnalyzing: false
    };

    window.addEventListener('DOMContentLoaded', async () => {
        Layout.mountNavigation('analysis');
        const statusHost = document.getElementById('page-status');
        initializeTrendDate();
        bindTrendControls();
        statusHost.innerHTML = Layout.alert('분석 데이터를 불러오는 중입니다.', 'info');

        try {
            const [
                evalSummaryResponse,
                evalItemsResponse,
                tradeFeedbackResponse,
                opportunitySummaryResponse,
                missedResponse,
                avoidedResponse,
                patternsResponse,
                opportunityFeedbackResponse,
                sectorScoresResponse,
                sectorTrendMatchResponse
            ] = await Promise.all([
                API.getEvaluationSummary(1),
                API.getTradeEvaluations(1),
                API.getTradeFeedback(1),
                API.getOpportunitySummary(1),
                API.getMissedOpportunities(1),
                API.getAvoidedLosses(1),
                API.getOpportunityPatterns(1),
                API.getOpportunityFeedback(1),
                API.getSectorTrends(trendState.selectedDate),
                API.getPortfolioTrendMatch(1, trendState.selectedDate)
            ]);

            renderEvaluationSummary(evalSummaryResponse.data);
            renderTradeFeedback(tradeFeedbackResponse.data);
            renderEvaluationTable(evalItemsResponse.data || []);

            renderOpportunitySummary(opportunitySummaryResponse.data);
            renderOpportunityList('missed-list', missedResponse.data || [], '상승 잠재력을 놓친 사례가 없습니다.');
            renderOpportunityList('avoided-list', avoidedResponse.data || [], '회피한 위험 사례가 없습니다.');
            renderPatterns(patternsResponse.data || []);
            renderOpportunityFeedback(opportunityFeedbackResponse.data);

            renderScores(sectorScoresResponse.data || []);
            renderTrendMatch(sectorTrendMatchResponse.data);
            renderExposure(hasStoredTrendData(sectorTrendMatchResponse.data) ? (sectorTrendMatchResponse.data?.exposures || []) : []);

            statusHost.innerHTML = Layout.alert('분석 데이터 로딩이 완료되었습니다.', 'success');
        } catch (error) {
            statusHost.innerHTML = Layout.alert(error.message || '분석 데이터를 불러오지 못했습니다.', 'error');
        }
    });

    function renderEvaluationSummary(summary) {
        const cards = [
            ['종합 판단 점수', Format.score(summary.averageTotalScore), summary.mainWeakness || '요약 약점 정보 없음'],
            ['진입 타이밍', Format.score(summary.averageEntryScore), '평균 Entry 점수'],
            ['청산 타이밍', Format.score(summary.averageExitScore), '평균 Exit 점수'],
            ['리스크 관리', Format.score(summary.averageRiskScore), '평균 Risk 점수'],
            ['분산 투자', Format.score(summary.averageDiversificationScore), '평균 Diversification 점수'],
            ['섹터 적합성', Format.score(summary.averageSectorFitScore), '평균 Sector Fit 점수']
        ];
        document.getElementById('evaluation-summary-cards').innerHTML = cards.map(([label, value, hint]) => `
            <article class="card stat-card">
                <div class="stat-card__label">${label}</div>
                <div class="stat-card__value">${value}</div>
                <div class="stat-card__hint">${Layout.escapeHtml(hint)}</div>
            </article>
        `).join('');
    }

    function renderTradeFeedback(feedback) {
        document.getElementById('trade-feedback-box').innerHTML = `
            <div>${Layout.escapeHtml(feedback.message || '피드백이 없습니다.')}</div>
            <div class="muted" style="margin-top:10px;">Provider: ${Layout.escapeHtml(feedback.providerType || '-')} / ${Format.dateTime(feedback.createdAt)}</div>
        `;
    }

    function renderEvaluationTable(items) {
        const host = document.getElementById('evaluations-table');
        if (!items.length) {
            host.innerHTML = Layout.empty('거래 평가 데이터가 없습니다.');
            return;
        }
        host.innerHTML = `
            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>거래 ID</th>
                        <th>Total</th>
                        <th>Entry</th>
                        <th>Exit</th>
                        <th>Risk</th>
                        <th>Diversification</th>
                        <th>Sector Fit</th>
                        <th>평가 시각</th>
                        <th>피드백</th>
                    </tr>
                    </thead>
                    <tbody>
                    ${items.map(item => `
                        <tr>
                            <td>#${Format.integer(item.tradeHistoryId)}</td>
                            <td><strong>${Format.score(item.totalScore)}</strong></td>
                            <td>${Format.score(item.entryScore)}</td>
                            <td>${Format.score(item.exitScore)}</td>
                            <td>${Format.score(item.riskScore)}</td>
                            <td>${Format.score(item.diversificationScore)}</td>
                            <td>${Format.score(item.sectorFitScore)}</td>
                            <td>${Format.dateTime(item.evaluatedAt)}</td>
                            <td>${Layout.escapeHtml(item.feedback || '-')}</td>
                        </tr>
                    `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    function renderOpportunitySummary(summary) {
        const cards = [
            ['놓친 기회 수', Format.integer(summary.missedCount), 'watchlist 이후 상승한 종목'],
            ['피한 위험 수', Format.integer(summary.avoidedCount), '매수하지 않아 피한 하락'],
            ['너무 빨리 판 거래', Format.integer(summary.soldTooEarlyCount), '매도 후 더 오른 거래'],
            ['오래 보유한 거래', Format.integer(summary.heldTooLongCount), '큰 손실 후 정리된 거래']
        ];
        document.getElementById('opportunity-summary-cards').innerHTML = cards.map(([label, value, hint]) => `
            <article class="card stat-card">
                <div class="stat-card__label">${label}</div>
                <div class="stat-card__value">${value}</div>
                <div class="stat-card__hint">${Layout.escapeHtml(hint)}</div>
            </article>
        `).join('');
    }

    function renderOpportunityList(hostId, items, emptyMessage) {
        const host = document.getElementById(hostId);
        const topItems = items.slice(0, 3);
        if (!topItems.length) {
            host.innerHTML = Layout.empty(emptyMessage);
            return;
        }
        host.innerHTML = topItems.map(item => `
            <article class="card" style="margin-top: 12px;">
                <div class="section-header" style="margin-bottom: 10px;">
                    <div>
                        <h3 style="margin:0;">${Layout.escapeHtml(item.symbol)}</h3>
                        <p class="section-subtitle">${Layout.escapeHtml(item.sectorCode)} / ${Format.dateTime(item.detectedAt)}</p>
                    </div>
                    <div class="${Format.percentClass(item.changeRate)}"><strong>${Format.percent(item.changeRate)}</strong></div>
                </div>
                <div class="muted">${Layout.escapeHtml(item.reason || '-')}</div>
                <div style="margin-top:10px;">${Layout.escapeHtml(item.feedback || '-')}</div>
            </article>
        `).join('');
    }

    function renderPatterns(items) {
        const host = document.getElementById('patterns-table');
        if (!items.length) {
            host.innerHTML = Layout.empty('거래 패턴 데이터가 없습니다.');
            return;
        }
        host.innerHTML = `
            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>패턴</th>
                        <th>심볼</th>
                        <th>섹터</th>
                        <th>기준일</th>
                        <th>실제 가격</th>
                        <th>참고 가격</th>
                        <th>변화율</th>
                        <th>사유</th>
                    </tr>
                    </thead>
                    <tbody>
                    ${items.map(item => `
                        <tr>
                            <td>${Layout.escapeHtml(item.patternType)}</td>
                            <td><strong>${Layout.escapeHtml(item.symbol)}</strong></td>
                            <td>${Layout.escapeHtml(item.sectorCode)}</td>
                            <td>${Format.date(item.baseDate)}</td>
                            <td>${Format.currency(item.actualPrice)}</td>
                            <td>${Format.currency(item.referencePrice)}</td>
                            <td class="${Format.percentClass(item.changeRate)}">${Format.percent(item.changeRate)}</td>
                            <td>${Layout.escapeHtml(item.feedback || item.reason || '-')}</td>
                        </tr>
                    `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    function renderOpportunityFeedback(feedback) {
        document.getElementById('opportunity-feedback-box').innerHTML = `
            <div>${Layout.escapeHtml(feedback.message || '피드백이 없습니다.')}</div>
            <div class="muted" style="margin-top:10px;">Provider: ${Layout.escapeHtml(feedback.providerType || '-')} / ${Format.dateTime(feedback.createdAt)}</div>
        `;
    }

    function renderScores(scores) {
        const host = document.getElementById('sector-scoreboard');
        if (!scores.length) {
            host.innerHTML = Layout.empty('저장된 섹터 동향 데이터가 없습니다. 동향 분석 버튼을 눌러주세요.');
            return;
        }
        host.innerHTML = scores.map(score => `
            <article class="card stat-card">
                <div class="stat-card__label">${Layout.escapeHtml(score.sectorCode)}</div>
                <div class="stat-card__value">${Format.score(score.totalSectorScore)}</div>
                <div>${Layout.statusPill(score.status)}</div>
                <div class="stat-card__hint">${Layout.escapeHtml(score.sectorName)} / ${Format.date(score.scoreDate)} / 기사 ${Format.integer(score.articleCount || 0)}건</div>
                <div class="muted">Tone ${Format.number(score.avgToneScore, 2)} / Keyword ${Format.number(score.keywordStrengthScore, 2)}</div>
                <div class="bar-track"><div class="bar-fill ${score.status === 'STRONG' ? 'success' : score.status === 'WEAK' ? 'danger' : ''}" style="width: ${Math.min(Number(score.totalSectorScore) || 0, 100)}%"></div></div>
            </article>
        `).join('');
    }

    function renderTrendMatch(diagnostic) {
        if (!diagnostic) {
            document.getElementById('diagnostic-cards').innerHTML = Layout.empty('포트폴리오 동향 일치도 데이터가 없습니다.');
            return;
        }
        if ((diagnostic.message || '').includes('동향 분석 버튼')) {
            document.getElementById('diagnostic-cards').innerHTML = Layout.empty(diagnostic.message);
            return;
        }
        document.getElementById('diagnostic-cards').innerHTML = `
            <article class="card stat-card">
                <div class="stat-card__label">동향 일치도</div>
                <div class="stat-card__value">${Format.score(diagnostic.trendMatchScore)}</div>
                <div class="stat-card__hint">${Format.date(diagnostic.matchDate)} 기준 포트폴리오와 섹터 뉴스 흐름의 일치도</div>
            </article>
            <article class="card stat-card">
                <div class="stat-card__label">강/약 노출</div>
                <div class="stat-card__value">강 ${Format.percent(diagnostic.strongExposure)} / 약 ${Format.percent(diagnostic.weakExposure)}</div>
                <div class="stat-card__hint">${Layout.escapeHtml(diagnostic.message || '진단 문장이 없습니다.')}</div>
            </article>
        `;
    }

    function renderExposure(items) {
        const host = document.getElementById('exposure-table');
        if (!items.length) {
            host.innerHTML = Layout.empty('포트폴리오 섹터 노출 데이터가 없습니다.');
            return;
        }
        host.innerHTML = `
            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>섹터</th>
                        <th>보유 비중</th>
                        <th>섹터 점수</th>
                        <th>상태</th>
                    </tr>
                    </thead>
                    <tbody>
                    ${items.map(item => `
                        <tr>
                            <td><strong>${Layout.escapeHtml(item.sectorName)}</strong> (${Layout.escapeHtml(item.sectorCode)})</td>
                            <td>${Format.percent(item.portfolioRate)}</td>
                            <td>${Format.score(item.sectorScore)}</td>
                            <td>${Layout.statusPill(item.status)}</td>
                        </tr>
                    `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    function initializeTrendDate() {
        trendState.selectedDate = new Date().toISOString().slice(0, 10);
        document.getElementById('trend-date').value = trendState.selectedDate;
    }

    function bindTrendControls() {
        document.getElementById('trend-date').addEventListener('change', async (event) => {
            trendState.selectedDate = event.currentTarget.value;
            await reloadTrendPanels(false);
        });

        document.getElementById('analyze-trend-button').addEventListener('click', async () => {
            if (trendState.isAnalyzing) {
                return;
            }
            await reloadTrendPanels(true);
        });
    }

    async function reloadTrendPanels(runAnalysis) {
        const statusHost = document.getElementById('page-status');
        const analyzeButton = document.getElementById('analyze-trend-button');
        if (runAnalysis) {
            trendState.isAnalyzing = true;
            analyzeButton.disabled = true;
        }
        statusHost.innerHTML = Layout.alert(runAnalysis ? '섹터 동향 분석을 실행하는 중입니다.' : '선택 날짜의 섹터 동향을 불러오는 중입니다.', 'info');
        try {
            let trendsResponse;
            let trendMatchResponse;
            if (runAnalysis) {
                const response = await API.analyzeSectorTrendForUser(1, trendState.selectedDate);
                trendsResponse = {data: response.data?.trends || []};
                trendMatchResponse = {data: response.data?.trendMatch || null};
            } else {
                [trendsResponse, trendMatchResponse] = await Promise.all([
                    API.getSectorTrends(trendState.selectedDate),
                    API.getPortfolioTrendMatch(1, trendState.selectedDate)
                ]);
            }
            renderScores(trendsResponse.data || []);
            renderTrendMatch(trendMatchResponse.data);
            renderExposure(hasStoredTrendData(trendMatchResponse.data) ? (trendMatchResponse.data?.exposures || []) : []);
            statusHost.innerHTML = Layout.alert(runAnalysis ? '섹터 동향 분석이 완료되었습니다.' : '날짜별 섹터 동향을 불러왔습니다.', 'success');
        } catch (error) {
            const message = runAnalysis
                ? `호출에 실패했습니다. ${error.message || '섹터 동향을 불러오지 못했습니다.'}`
                : (error.message || '섹터 동향을 불러오지 못했습니다.');
            statusHost.innerHTML = Layout.alert(message, 'error');
        } finally {
            if (runAnalysis) {
                trendState.isAnalyzing = false;
                analyzeButton.disabled = false;
            }
        }
    }

    function hasStoredTrendData(diagnostic) {
        return diagnostic && !(diagnostic.message || '').includes('동향 분석 버튼');
    }
</script>
</body>
</html>
