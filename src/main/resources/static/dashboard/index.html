<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeAgent Dashboard</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/layout.js" defer></script>
    <script src="/js/api.js?v=20260609-watchlist-2" defer></script>
    <script src="/js/format.js" defer></script>
    <script src="/js/charts.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app-nav"></div>

<main class="page-shell">
    <section class="page-hero">
        <h1 class="page-title">포트폴리오 대시보드</h1>
        <p class="page-description">차트 조회, 매수/매도 등록, 포트폴리오 요약을 한 화면에서 처리합니다.</p>
    </section>

    <div id="page-status"></div>

    <section class="section">
        <div class="dashboard-top">
            <div class="card">
                <div class="chart-toolbar">
                    <form id="chart-form" class="form-grid">
                        <label class="form-label">
                            Symbol
                            <input class="input" id="symbol" name="symbol" value="NVDA" required>
                        </label>
                        <label class="form-label">
                            Timeframe
                            <input class="input" id="timeframe" name="timeframe" value="1Day" required>
                        </label>
                        <label class="form-label">
                            Start
                            <input class="input" id="start" name="start" type="date" required>
                        </label>
                        <label class="form-label">
                            End
                            <input class="input" id="end" name="end" type="date" required>
                        </label>
                    </form>
                    <div style="display:flex; gap:8px; align-items:end;">
                        <button id="load-chart-button" class="button" type="button">차트 조회</button>
                        <button id="add-watchlist-button" class="button secondary" type="button">관심종목 추가</button>
                    </div>
                </div>
                <div id="chart-status" class="alert alert-info">차트 데이터를 불러올 준비가 되었습니다.</div>
                <div id="dashboard-chart" class="chart-host"></div>
            </div>

            <aside class="trade-panel">
                <div class="card">
                    <h2 class="section-title">현재 선택 종목</h2>
                    <div class="small-meta" id="selected-symbol-meta"></div>
                </div>

                <div class="card">
                    <h2 class="section-title">매수 등록</h2>
                    <form id="buy-form" class="form-grid">
                        <label class="form-label">
                            User ID
                            <input class="input" name="userId" type="number" min="1" value="1" required>
                        </label>
                        <label class="form-label">
                            Symbol
                            <input class="input" name="symbol" required>
                        </label>
                        <label class="form-label">
                            Sector
                            <select class="input" id="buy-sector-select" name="sectorCode" required></select>
                        </label>
                        <label class="form-label">
                            Price
                            <input class="input" name="price" type="number" min="0.0001" step="0.0001" required>
                        </label>
                        <label class="form-label">
                            Quantity
                            <input class="input" name="quantity" type="number" min="1" step="1" required>
                        </label>
                        <button class="button" type="submit">매수 등록</button>
                    </form>
                </div>

                <div class="card">
                    <h2 class="section-title">매도 등록</h2>
                    <form id="sell-form" class="form-grid">
                        <label class="form-label">
                            User ID
                            <input class="input" name="userId" type="number" min="1" value="1" required>
                        </label>
                        <label class="form-label">
                            Symbol
                            <input class="input" name="symbol" required>
                        </label>
                        <label class="form-label">
                            Price
                            <input class="input" name="price" type="number" min="0.0001" step="0.0001" required>
                        </label>
                        <label class="form-label">
                            Quantity
                            <input class="input" name="quantity" type="number" min="1" step="1" required>
                        </label>
                        <button class="button" type="submit">매도 등록</button>
                    </form>
                </div>
            </aside>
        </div>
    </section>

    <section class="section">
        <div id="summary-cards" class="grid cols-4"></div>
    </section>

    <section class="section">
        <div class="section-header">
            <div>
                <section class="section">
                    <div class="section-header">
                        <div>
                            <h2 class="section-title">Watchlist</h2>
                            <p class="section-subtitle">차트 조회 후 관심종목으로 추가한 종목을 확인합니다.</p>
                        </div>
                        <button class="button secondary" id="remove-watchlist-button" type="button">관심 종목 제거</button>
                    </div>
                    <div class="card">
                        <div id="watchlist-table"></div>
                    </div>
                </section>
                <h2 class="section-title">보유 종목</h2>
                <p class="section-subtitle">행의 버튼을 누르면 상단 차트가 해당 종목으로 전환됩니다.</p>
            </div>
        </div>
        <div class="card">
            <div id="positions-table"></div>
        </div>
    </section>

    <section class="section">
        <div class="section-header">
            <div>
                <h2 class="section-title">섹터 비중</h2>
                <p class="section-subtitle">도넛 차트와 상세 비율을 함께 표시합니다.</p>
            </div>
        </div>
        <div class="card">
            <div class="doughnut-wrap">
                <div class="doughnut-canvas">
                    <canvas id="sector-doughnut"></canvas>
                </div>
                <div id="sector-allocation"></div>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="section-header">
            <div>
                <h2 class="section-title">거래 내역</h2>
                <p class="section-subtitle">대시보드 하단에서 H2에 저장된 체결 이력을 확인합니다.</p>
            </div>
        </div>
        <div class="card">
            <div id="trade-history-table"></div>
        </div>
    </section>
</main>

<script>
    const state = {
        selectedSymbol: 'NVDA',
        selectedTimeframe: '1Day',
        selectedStart: '',
        selectedEnd: ''
    };

    let priceChart;
    let sectorDoughnut;
    let sectorOptions = [];

    window.addEventListener('DOMContentLoaded', async () => {
        Layout.mountNavigation('dashboard');
        initializeDateInputs();
        await loadSectorOptions();
        syncFormsWithSelectedSymbol();
        bindEventHandlers();
        priceChart = Charts.createTradingViewChart('dashboard-chart', {height: 460});
        sectorDoughnut = Charts.createDoughnutChart('sector-doughnut');

        await refreshPortfolioPanels();
        await loadChart();
    });

    function initializeDateInputs() {
        const end = new Date();
        const start = new Date();
        start.setDate(end.getDate() - 60);
        state.selectedStart = toDateInput(start);
        state.selectedEnd = toDateInput(end);
        document.getElementById('start').value = state.selectedStart;
        document.getElementById('end').value = state.selectedEnd;
        document.getElementById('symbol').value = state.selectedSymbol;
        document.getElementById('timeframe').value = state.selectedTimeframe;
    }

    function bindEventHandlers() {
        document.getElementById('load-chart-button').addEventListener('click', async () => {
            readChartFormValues();
            await loadChart();
        });

        document.getElementById('add-watchlist-button').addEventListener('click', async () => {
            readChartFormValues();
            await addSelectedSymbolToWatchlist();
        });

        document.getElementById('remove-watchlist-button').addEventListener('click', async () => {
            await removeSelectedWatchlistItems();
        });

        document.getElementById('chart-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            readChartFormValues();
            await loadChart();
        });

        document.getElementById('buy-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            await submitBuy(event.currentTarget);
        });

        document.getElementById('sell-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            await submitSell(event.currentTarget);
        });

        window.addEventListener('resize', () => {
            if (priceChart) {
                priceChart.resize();
            }
        });
    }

    function readChartFormValues() {
        state.selectedSymbol = String(document.getElementById('symbol').value || '').trim().toUpperCase() || 'NVDA';
        state.selectedTimeframe = String(document.getElementById('timeframe').value || '').trim() || '1Day';
        state.selectedStart = document.getElementById('start').value;
        state.selectedEnd = document.getElementById('end').value;
        syncFormsWithSelectedSymbol();
    }

    async function refreshPortfolioPanels() {
        const statusHost = document.getElementById('page-status');
        statusHost.innerHTML = Layout.alert('포트폴리오 데이터를 불러오는 중입니다.', 'info');
        try {
            const [summaryResponse, positionsResponse, sectorsResponse, tradeHistoryResponse, watchlistResponse] = await Promise.all([
                API.getPortfolioSummary(1),
                API.getPortfolioPositions(1),
                API.getSectorAllocation(1),
                API.getTradeHistory(1),
                API.getWatchlist(1)
            ]);

            renderSummary(summaryResponse.data);
            renderPositions(positionsResponse.data || []);
            renderSectorAllocation(sectorsResponse.data || []);
            renderTradeHistory(tradeHistoryResponse.data || []);
            renderWatchlist(watchlistResponse.data || []);

            statusHost.innerHTML = Layout.alert('포트폴리오 데이터 로딩이 완료되었습니다.', 'success');
        } catch (error) {
            statusHost.innerHTML = Layout.alert(error.message || '대시보드 데이터를 불러오지 못했습니다.', 'error');
        }
    }

    async function loadSectorOptions() {
        const response = await API.getSectorOptions();
        sectorOptions = response.data || [];
        const select = document.getElementById('buy-sector-select');
        if (!sectorOptions.length) {
            select.innerHTML = '<option value="">선택 가능한 섹터가 없습니다.</option>';
            return;
        }
        select.innerHTML = sectorOptions.map(item => `
            <option value="${Layout.escapeHtml(item.sectorCode)}">${Layout.escapeHtml(item.sectorName)} (${Layout.escapeHtml(item.sectorCode)})</option>
        `).join('');
    }

    async function loadChart() {
        const chartStatus = document.getElementById('chart-status');
        chartStatus.className = 'alert alert-info';
        chartStatus.textContent = '차트 데이터를 불러오는 중입니다.';
        updateSelectedSymbolMeta();

        try {
            const payload = await API.getChartBars({
                symbol: state.selectedSymbol,
                timeframe: state.selectedTimeframe,
                start: state.selectedStart,
                end: state.selectedEnd
            });

            const bars = Array.isArray(payload?.bars) ? payload.bars : [];
            if (!bars.length) {
                priceChart.setBars([]);
                chartStatus.className = 'alert alert-warning';
                chartStatus.textContent = '선택한 범위에서 차트 데이터가 없습니다.';
                return;
            }

            priceChart.setBars(bars);
            chartStatus.className = 'alert alert-success';
            chartStatus.textContent = `${payload.symbol} ${payload.start} ~ ${payload.end} (${bars.length} bars)`;
        } catch (error) {
            priceChart.setBars([]);
            chartStatus.className = 'alert alert-error';
            chartStatus.textContent = error.message || '차트 데이터를 불러오지 못했습니다.';
        }
    }

    function renderSummary(summary) {
        const cards = [
            ['총 매수금액', Format.currency(summary.totalBuyAmount), '누적 매수 원가 기준입니다.'],
            ['총 평가금액', Format.currency(summary.totalMarketValue), '현재가 기준 평가 금액입니다.'],
            ['총 손익', `<span class="${Format.percentClass(summary.totalProfitLoss)}">${Format.currency(summary.totalProfitLoss)}</span>`, '평가금액 - 매수금액'],
            ['총 수익률', `<span class="${Format.percentClass(summary.totalReturnRate)}">${Format.percent(summary.totalReturnRate)}</span>`, '포트폴리오 전체 수익률'],
            ['보유 종목 수', Format.integer(summary.positionCount), '현재 포지션 개수']
        ];

        document.getElementById('summary-cards').innerHTML = cards.map(([label, value, hint]) => `
            <article class="card stat-card">
                <div class="stat-card__label">${label}</div>
                <div class="stat-card__value">${value}</div>
                <div class="stat-card__hint">${hint}</div>
            </article>
        `).join('');
    }

    function renderPositions(positions) {
        const host = document.getElementById('positions-table');
        if (!positions.length) {
            host.innerHTML = Layout.empty('보유 종목이 없습니다.');
            return;
        }

        host.innerHTML = `
            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>심볼</th>
                        <th>섹터</th>
                        <th>평균 매수가</th>
                        <th>현재가</th>
                        <th>수량</th>
                        <th>평가금액</th>
                        <th>손익</th>
                        <th>수익률</th>
                        <th>이동</th>
                    </tr>
                    </thead>
                    <tbody>
                    ${positions.map(position => `
                        <tr>
                            <td><strong>${Layout.escapeHtml(position.symbol)}</strong></td>
                            <td>${Layout.escapeHtml(position.sectorCode)}</td>
                            <td>${Format.currency(position.avgBuyPrice)}</td>
                            <td>${Format.currency(position.currentPrice)}</td>
                            <td>${Format.integer(position.quantity)}</td>
                            <td>${Format.currency(position.marketValue)}</td>
                            <td class="${Format.percentClass(position.profitLoss)}">${Format.currency(position.profitLoss)}</td>
                            <td class="${Format.percentClass(position.returnRate)}">${Format.percent(position.returnRate)}</td>
                            <td><button class="button secondary chart-select" data-symbol="${Layout.escapeHtml(position.symbol)}" type="button">차트 보기</button></td>
                        </tr>
                    `).join('')}
                    </tbody>
                </table>
            </div>
        `;

        host.querySelectorAll('.chart-select').forEach((button) => {
            button.addEventListener('click', async () => {
                state.selectedSymbol = button.dataset.symbol || state.selectedSymbol;
                document.getElementById('symbol').value = state.selectedSymbol;
                syncFormsWithSelectedSymbol();
                await loadChart();
            });
        });
    }

    function renderSectorAllocation(items) {
        const host = document.getElementById('sector-allocation');
        if (!items.length) {
            host.innerHTML = Layout.empty('섹터 비중 데이터가 없습니다.');
            sectorDoughnut.setData([], []);
            return;
        }

        sectorDoughnut.setData(
            items.map(item => item.sectorCode),
            items.map(item => Number(item.allocationRate) || 0)
        );

        host.innerHTML = `
            <div class="bar-list">
                ${items.map(item => `
                    <div class="bar-row">
                        <div class="bar-row__meta">
                            <span><strong>${Layout.escapeHtml(item.sectorName)}</strong> (${Layout.escapeHtml(item.sectorCode)})</span>
                            <span>${Format.percent(item.allocationRate)} / ${Format.currency(item.marketValue)}</span>
                        </div>
                        <div class="bar-track">
                            <div class="bar-fill" style="width: ${Math.min(Number(item.allocationRate) || 0, 100)}%"></div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderWatchlist(items) {
        const host = document.getElementById('watchlist-table');

        if (!items.length) {
            host.innerHTML = Layout.empty('관심 종목이 없습니다. 차트 조회 후 관심종목 추가 버튼을 눌러 등록하세요.');
            return;
        }

        host.innerHTML = `
        <div class="table-wrap">
            <table class="data-table">
                <thead>
                <tr>
                    <th>선택</th>
                    <th>종목 코드</th>
                    <th>등록일</th>
                    <th>등록 이후 변동률</th>
                    <th>차트</th>
                </tr>
                </thead>
                <tbody>
                ${items.map(item => `
                    <tr>
                        <td>
                            <input type="checkbox"
                                   class="watchlist-check"
                                   value="${Layout.escapeHtml(item.symbol)}">
                        </td>
                        <td><strong>${Layout.escapeHtml(item.symbol)}</strong></td>
                        <td>${Format.dateTime(item.registeredAt)}</td>
                        <td class="${Format.percentClass(item.changeRate)}">${Format.percent(item.changeRate)}</td>
                        <td>
                            <button class="button secondary watchlist-chart-select"
                                    data-symbol="${Layout.escapeHtml(item.symbol)}"
                                    type="button">차트 보기</button>
                        </td>
                    </tr>
                `).join('')}
                </tbody>
            </table>
        </div>
    `;

        host.querySelectorAll('.watchlist-chart-select').forEach((button) => {
            button.addEventListener('click', async () => {
                state.selectedSymbol = button.dataset.symbol || state.selectedSymbol;
                document.getElementById('symbol').value = state.selectedSymbol;
                syncFormsWithSelectedSymbol();
                await loadChart();
            });
        });
    }

    async function addSelectedSymbolToWatchlist() {
        const statusHost = document.getElementById('page-status');
        const symbol = String(state.selectedSymbol || '').trim().toUpperCase();

        if (!symbol) {
            statusHost.innerHTML = Layout.alert('관심종목으로 추가할 종목 코드가 없습니다.', 'error');
            return;
        }

        try {
            await API.addWatchlist({
                userId: 1,
                symbol
            });

            statusHost.innerHTML = Layout.alert(`Watchlist 추가 완료: ${symbol}`, 'success');
            await refreshPortfolioPanels();
        } catch (error) {
            statusHost.innerHTML = Layout.alert(error.message || 'Watchlist 추가에 실패했습니다.', 'error');
        }
    }

    async function removeSelectedWatchlistItems() {
        const statusHost = document.getElementById('page-status');
        const checked = Array.from(document.querySelectorAll('.watchlist-check:checked'));
        const symbols = checked.map(item => item.value).filter(Boolean);

        if (!symbols.length) {
            statusHost.innerHTML = Layout.alert('제거할 관심 종목을 선택하세요.', 'warning');
            return;
        }

        try {
            await API.removeWatchlistItems({
                userId: 1,
                symbols
            });

            statusHost.innerHTML = Layout.alert(`Watchlist 제거 완료: ${symbols.join(', ')}`, 'success');
            await refreshPortfolioPanels();
        } catch (error) {
            statusHost.innerHTML = Layout.alert(error.message || 'Watchlist 제거에 실패했습니다.', 'error');
        }
    }

    function renderWatchlist(items) {
        const host = document.getElementById('watchlist-table');

        if (!items.length) {
            host.innerHTML = Layout.empty('관심 종목이 없습니다. 차트 조회 후 관심종목 추가 버튼을 눌러 등록하세요.');
            return;
        }

        host.innerHTML = `
        <div class="table-wrap">
            <table class="data-table">
                <thead>
                <tr>
                    <th>선택</th>
                    <th>종목 코드</th>
                    <th>기준일</th>
                    <th>기준일 이후 변동률</th>
                    <th>차트</th>
                </tr>
                </thead>
                <tbody>
                ${items.map(item => `
                    <tr>
                        <td>
                            <input type="checkbox"
                                   class="watchlist-check"
                                   value="${Layout.escapeHtml(item.symbol)}">
                        </td>
                        <td><strong>${Layout.escapeHtml(item.symbol)}</strong></td>
                        <td>${Layout.escapeHtml(item.watchStartDate || '-')}</td>
                        <td class="${Format.percentClass(item.changeRate)}">${Format.percent(item.changeRate)}</td>
                        <td>
                            <button class="button secondary watchlist-chart-select"
                                    data-symbol="${Layout.escapeHtml(item.symbol)}"
                                    type="button">차트 보기</button>
                        </td>
                    </tr>
                `).join('')}
                </tbody>
            </table>
        </div>
    `;

        host.querySelectorAll('.watchlist-chart-select').forEach((button) => {
            button.addEventListener('click', async () => {
                state.selectedSymbol = button.dataset.symbol || state.selectedSymbol;
                document.getElementById('symbol').value = state.selectedSymbol;
                syncFormsWithSelectedSymbol();
                await loadChart();
            });
        });
    }

    async function addSelectedSymbolToWatchlist() {
        const statusHost = document.getElementById('page-status');
        const symbol = String(state.selectedSymbol || '').trim().toUpperCase();
        const watchStartDate = state.selectedStart;

        if (!symbol) {
            statusHost.innerHTML = Layout.alert('관심종목으로 추가할 종목 코드가 없습니다.', 'error');
            return;
        }

        if (!watchStartDate) {
            statusHost.innerHTML = Layout.alert('관심종목 기준일로 사용할 시작일이 없습니다.', 'error');
            return;
        }

        try {
            await API.addWatchlist({
                userId: 1,
                symbol,
                watchStartDate
            });

            statusHost.innerHTML = Layout.alert(`Watchlist 추가 완료: ${symbol} / 기준일 ${watchStartDate}`, 'success');
            await refreshPortfolioPanels();
        } catch (error) {
            statusHost.innerHTML = Layout.alert(error.message || 'Watchlist 추가에 실패했습니다.', 'error');
        }
    }

    async function removeSelectedWatchlistItems() {
        const statusHost = document.getElementById('page-status');
        const checked = Array.from(document.querySelectorAll('.watchlist-check:checked'));
        const symbols = checked.map(item => item.value).filter(Boolean);

        if (!symbols.length) {
            statusHost.innerHTML = Layout.alert('제거할 관심 종목을 선택하세요.', 'warning');
            return;
        }

        try {
            await API.removeWatchlistItems({
                userId: 1,
                symbols
            });

            statusHost.innerHTML = Layout.alert(`Watchlist 제거 완료: ${symbols.join(', ')}`, 'success');
            await refreshPortfolioPanels();
        } catch (error) {
            statusHost.innerHTML = Layout.alert(error.message || 'Watchlist 제거에 실패했습니다.', 'error');
        }
    }
    
    function renderTradeHistory(items) {
        const host = document.getElementById('trade-history-table');
        if (!items.length) {
            host.innerHTML = Layout.empty('저장된 거래 내역이 없습니다.');
            return;
        }

        host.innerHTML = `
            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>시각</th>
                        <th>심볼</th>
                        <th>섹터</th>
                        <th>유형</th>
                        <th>가격</th>
                        <th>수량</th>
                    </tr>
                    </thead>
                    <tbody>
                    ${items.map(item => `
                        <tr>
                            <td>${Format.dateTime(item.tradedAt)}</td>
                            <td><strong>${Layout.escapeHtml(item.symbol)}</strong></td>
                            <td>${Layout.escapeHtml(item.sectorCode || '-')}</td>
                            <td>${Layout.escapeHtml(item.tradeType)}</td>
                            <td>${Format.currency(item.price)}</td>
                            <td>${Format.integer(item.quantity)}</td>
                        </tr>
                    `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    async function submitBuy(form) {
        const statusHost = document.getElementById('page-status');
        const formData = new FormData(form);
        const payload = {
            userId: Number(formData.get('userId')),
            symbol: String(formData.get('symbol') || '').trim().toUpperCase(),
            sectorCode: String(formData.get('sectorCode') || '').trim().toUpperCase(),
            price: Number(formData.get('price')),
            quantity: Number(formData.get('quantity'))
        };
        try {
            await API.buyStock(payload);
            state.selectedSymbol = payload.symbol;
            document.getElementById('symbol').value = state.selectedSymbol;
            syncFormsWithSelectedSymbol();
            statusHost.innerHTML = Layout.alert(`매수 등록 완료: ${payload.symbol}`, 'success');
            await refreshPortfolioPanels();
            await loadChart();
        } catch (error) {
            statusHost.innerHTML = Layout.alert(error.message || '매수 등록에 실패했습니다.', 'error');
        }
    }

    async function submitSell(form) {
        const statusHost = document.getElementById('page-status');
        const formData = new FormData(form);
        const payload = {
            userId: Number(formData.get('userId')),
            symbol: String(formData.get('symbol') || '').trim().toUpperCase(),
            price: Number(formData.get('price')),
            quantity: Number(formData.get('quantity'))
        };
        try {
            await API.sellStock(payload);
            state.selectedSymbol = payload.symbol;
            document.getElementById('symbol').value = state.selectedSymbol;
            syncFormsWithSelectedSymbol();
            statusHost.innerHTML = Layout.alert(`매도 등록 완료: ${payload.symbol}`, 'success');
            await refreshPortfolioPanels();
            await loadChart();
        } catch (error) {
            statusHost.innerHTML = Layout.alert(error.message || '매도 등록에 실패했습니다.', 'error');
        }
    }

    function syncFormsWithSelectedSymbol() {
        const symbol = state.selectedSymbol;
        const buyForm = document.getElementById('buy-form');
        const sellForm = document.getElementById('sell-form');
        buyForm.elements.symbol.value = symbol;
        sellForm.elements.symbol.value = symbol;
        if (sectorOptions.length && !buyForm.elements.sectorCode.value) {
            buyForm.elements.sectorCode.value = sectorOptions[0].sectorCode;
        }
        updateSelectedSymbolMeta();
    }

    function updateSelectedSymbolMeta() {
        document.getElementById('selected-symbol-meta').innerHTML = `
            <div>심볼 <strong>${Layout.escapeHtml(state.selectedSymbol)}</strong></div>
            <div>타임프레임 <strong>${Layout.escapeHtml(state.selectedTimeframe)}</strong></div>
            <div>시작일 <strong>${Layout.escapeHtml(state.selectedStart)}</strong></div>
            <div>종료일 <strong>${Layout.escapeHtml(state.selectedEnd)}</strong></div>
        `;
    }

    function toDateInput(date) {
        return date.toISOString().slice(0, 10);
    }
</script>
</body>
</html>
