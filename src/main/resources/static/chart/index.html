<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeAgent Chart</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/layout.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        .chart-shell {
            position: relative;
            min-height: 480px;
        }

        #status {
            margin-bottom: 12px;
        }

        #candles {
            width: 100%;
            height: 480px;
        }
    </style>
</head>
<body>
<div id="app-nav"></div>

<main class="page-shell">
    <section class="page-hero">
        <h1 class="page-title">차트 분석</h1>
        <p class="page-description">캔들차트와 거래량을 조회합니다. 대시보드의 차트 보기 버튼이 이 페이지로 심볼을 넘깁니다.</p>
    </section>

    <section class="section">
        <div class="card">
            <form id="chart-form" class="form-grid">
                <label class="form-label">
                    Symbol
                    <input class="input" id="symbol" name="symbol" value="AAPL" required>
                </label>
                <label class="form-label">
                    Timeframe
                    <input class="input" id="timeframe" name="timeframe" value="1Day" required>
                </label>
                <label class="form-label">
                    Start
                    <input class="input" id="start" name="start" type="date" required>
                </label>
                <label class="form-label">
                    End
                    <input class="input" id="end" name="end" type="date" required>
                </label>
                <button class="button" type="submit">Load Chart</button>
            </form>
        </div>
    </section>

    <section class="section">
        <div class="card">
            <div id="status" class="alert alert-info">차트 데이터를 불러올 준비가 되었습니다.</div>
            <div class="chart-shell">
                <div id="candles"></div>
            </div>
        </div>
    </section>
</main>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        Layout.mountNavigation('chart');
    });

    const form = document.getElementById('chart-form');
    const status = document.getElementById('status');
    const startInput = document.getElementById('start');
    const endInput = document.getElementById('end');
    const chartHost = document.getElementById('candles');
    const symbolInput = document.getElementById('symbol');
    const timeframeInput = document.getElementById('timeframe');

    const today = new Date();
    const prior = new Date();
    prior.setDate(today.getDate() - 60);

    const query = new URLSearchParams(window.location.search);
    symbolInput.value = query.get('symbol') || 'AAPL';
    timeframeInput.value = query.get('timeframe') || '1Day';
    startInput.value = query.get('start') || prior.toISOString().slice(0, 10);
    endInput.value = query.get('end') || today.toISOString().slice(0, 10);

    const chart = LightweightCharts.createChart(chartHost, {
        layout: {
            background: {color: '#1f2937'},
            textColor: '#e5e7eb'
        },
        grid: {
            vertLines: {color: 'rgba(203, 213, 225, 0.08)'},
            horzLines: {color: 'rgba(203, 213, 225, 0.08)'}
        },
        rightPriceScale: {
            borderColor: 'rgba(203, 213, 225, 0.2)'
        },
        timeScale: {
            borderColor: 'rgba(203, 213, 225, 0.2)',
            timeVisible: true
        },
        crosshair: {
            mode: LightweightCharts.CrosshairMode.Normal
        },
        width: chartHost.clientWidth,
        height: 480
    });

    const candleSeries = chart.addCandlestickSeries({
        upColor: '#22c55e',
        downColor: '#ef4444',
        borderVisible: false,
        wickUpColor: '#22c55e',
        wickDownColor: '#ef4444'
    });

    const volumeSeries = chart.addHistogramSeries({
        priceFormat: {
            type: 'volume'
        },
        priceScaleId: 'volume',
        color: 'rgba(148, 163, 184, 0.35)'
    });

    chart.priceScale('volume').applyOptions({
        scaleMargins: {
            top: 0.75,
            bottom: 0
        }
    });

    chart.priceScale('right').applyOptions({
        scaleMargins: {
            top: 0.1,
            bottom: 0.3
        }
    });

    window.addEventListener('resize', () => {
        chart.applyOptions({width: chartHost.clientWidth});
    });

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        status.className = 'alert alert-info';
        status.textContent = 'Loading chart bars...';
        try {
            const params = new URLSearchParams(new FormData(form));
            history.replaceState(null, '', `/chart/index.html?${params.toString()}`);
            const response = await fetch(`/chart/api/bars?${params.toString()}`);
            const payload = await response.json().catch(() => ({}));

            if (!response.ok) {
                const message = payload.detail || 'Failed to load chart data.';
                status.className = 'alert alert-error';
                status.textContent = message;
                return;
            }

            if (!Array.isArray(payload.bars) || payload.bars.length === 0) {
                status.className = 'alert alert-warning';
                status.textContent = 'No bar data returned for the selected range.';
                candleSeries.setData([]);
                volumeSeries.setData([]);
                return;
            }

            const candles = payload.bars.map((bar) => {
                const time = String(bar.time).slice(0, 10);
                return {
                    time,
                    open: bar.open,
                    high: bar.high,
                    low: bar.low,
                    close: bar.close
                };
            });

            const volumes = payload.bars.map((bar) => {
                const time = String(bar.time).slice(0, 10);
                const rising = bar.close >= bar.open;
                return {
                    time,
                    value: bar.volume,
                    color: rising ? 'rgba(34, 197, 94, 0.45)' : 'rgba(239, 68, 68, 0.45)'
                };
            });

            candleSeries.setData(candles);
            volumeSeries.setData(volumes);
            chart.timeScale().fitContent();

            status.className = 'alert alert-success';
            status.textContent = `${payload.symbol} ${payload.start} ~ ${payload.end} (${payload.bars.length} bars)`;
        } catch (error) {
            status.className = 'alert alert-error';
            status.textContent = error instanceof Error ? error.message : 'Unexpected chart rendering error.';
        }
    });

    form.requestSubmit();
</script>
</body>
</html>
